<nav class="bottom-bar" role="navigation" aria-label="Main navigation">

  <!-- Scanner -->
  <a href="{{ url_for('student.scan') }}"
     class="bar-btn {% if active_tab == 'scan' %}active{% endif %}"
     aria-label="Scanner">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="3" width="5" height="5" rx="1"/>
      <rect x="16" y="3" width="5" height="5" rx="1"/>
      <rect x="3" y="16" width="5" height="5" rx="1"/>
      <path d="M16 16h2v2h-2zM18 18h2v2h-2zM16 20h2M20 16v2"/>
    </svg>
    Scan
  </a>

  <!-- History -->
  <a href="{{ url_for('student.history') }}"
     class="bar-btn {% if active_tab == 'history' %}active{% endif %}"
     aria-label="History">
    <svg viewBox="0 0 24 24">
      <path d="M12 8v4l3 3"/>
      <circle cx="12" cy="12" r="9"/>
    </svg>
    History
  </a>

  <!-- Settings — dropdown trigger -->
  <div class="bar-btn-wrap">

    <!-- Dropdown (opens upward) -->
      <div id="barSettingsDropdown" class="bar-dropdown" aria-hidden="true">
      <a href="{{ url_for('auth.logout') }}" class="bar-dropdown-item danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </a>
    </div>

    <button id="barSettingsBtn"
            class="bar-btn {% if active_tab == 'settings' %}active{% endif %}"
            aria-label="Settings"
            aria-expanded="false"
            aria-controls="barSettingsDropdown">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>

  </div><!-- /.bar-btn-wrap -->

</nav>

<style>
  /* 1. Layout Wrapper */
  .bar-btn-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 2. Buttons & Touch Interaction */
  .bar-btn, 
  .bar-btn-wrap button {
    touch-action: manipulation; /* Removes 300ms tap delay */
    cursor: pointer;
    -webkit-tap-highlight-color: transparent; /* Clean tap on mobile */
    /* Add your other existing button styles here */
  }

  /* 3. The Dropdown Panel */
  .bar-dropdown {
    position: absolute;
    bottom: calc(100% + 10px); /* Sits above the bar */
    right: 0;
    min-width: 176px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    overflow: hidden;
    z-index: 200;

    /* Hidden State - Starts lower and slightly smaller */
    opacity: 0;
    transform: translateY(12px) scale(0.95);
    pointer-events: none;
    
    /* Optimized Transition for 'Snappiness' */
    transition: 
      opacity 0.12s ease-out, 
      transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1); /* Tiny 'pop' effect */
  }

  /* 4. Open State */
  .bar-dropdown.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* 5. Dropdown Items */
  .bar-dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
    text-decoration: none;
    transition: background 0.12s, color 0.12s;
  }

  .bar-dropdown-item:hover { 
    background: #f0f0ff; 
    color: #6366f1; 
  }

  .bar-dropdown-item.danger { 
    color: #dc2626; 
  }

  .bar-dropdown-item.danger:hover { 
    background: #fef2f2; 
    color: #b91c1c; 
  }

  /* 6. Icons inside items */
  .bar-dropdown-item svg {
    width: 16px; 
    height: 16px;
    stroke: currentColor; 
    fill: none;
    stroke-width: 1.8; 
    stroke-linecap: round; 
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* 7. Divider */
  .bar-dropdown-divider {
    margin: 0;
    border: none;
    border-top: 1px solid #f3f4f6;
  }
</style>

<script>
  (function () {
    const btn      = document.getElementById('barSettingsBtn');
    const dropdown = document.getElementById('barSettingsDropdown');
    if (!btn || !dropdown) return;

    function open() {
      dropdown.classList.add('open');
      dropdown.setAttribute('aria-hidden', 'false');
      btn.setAttribute('aria-expanded', 'true');
    }

    function close() {
      dropdown.classList.remove('open');
      dropdown.setAttribute('aria-hidden', 'true');
      btn.setAttribute('aria-expanded', 'false');
    }

    // Toggle on button tap
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      dropdown.classList.contains('open') ? close() : open();
    });

    // Close when tapping anywhere else on the page
    document.addEventListener('click', function (e) {
      if (!dropdown.contains(e.target) && e.target !== btn) close();
    });

    // Close on Escape
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') close();
    });
  })();
</script>
