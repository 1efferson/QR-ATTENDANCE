{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <!-- Header -->
    <div class="mb-6">
        <a href="{% if current_user.role == 'admin' %}{{ url_for('admin.dashboard') }}{% elif current_user.role == 'instructor' %}{{ url_for('instructor.dashboard') }}{% else %}{{ url_for('student.scan') }}{% endif %}" 
           class="text-indigo-600 hover:text-indigo-800 flex items-center mb-4">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back
        </a>
        <h2 class="text-3xl font-extrabold text-gray-900">Change Password</h2>
        <p class="text-gray-600 mt-1">Update your account password</p>
    </div>

    <form method="POST" action="{{ url_for('auth.change_password') }}">
        <div class="space-y-4">
            <!-- Current Password -->
            <div>
                <label for="current_password" class="block text-sm font-medium text-gray-700">
                    Current Password <span class="text-red-500">*</span>
                </label>
                <div class="relative mt-1">
                    <input type="password" id="current_password" name="current_password" required
                           class="block w-full px-4 py-2 pr-10 bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <button type="button" onclick="togglePassword('current_password', 'toggleCurrent')" 
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600 hover:text-gray-800">
                        <span id="toggleCurrent">👁️</span>
                    </button>
                </div>
            </div>

            <!-- New Password -->
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700">
                    New Password <span class="text-red-500">*</span>
                </label>
                <div class="relative mt-1">
                    <input type="password" id="new_password" name="new_password" required
                           minlength="6"
                           class="block w-full px-4 py-2 pr-10 bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <button type="button" onclick="togglePassword('new_password', 'toggleNew')" 
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600 hover:text-gray-800">
                        <span id="toggleNew">👁️</span>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mt-1">Minimum 6 characters</p>
            </div>

            <!-- Confirm New Password -->
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">
                    Confirm New Password <span class="text-red-500">*</span>
                </label>
                <div class="relative mt-1">
                    <input type="password" id="confirm_password" name="confirm_password" required
                           minlength="6"
                           class="block w-full px-4 py-2 pr-10 bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <button type="button" onclick="togglePassword('confirm_password', 'toggleConfirm')" 
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600 hover:text-gray-800">
                        <span id="toggleConfirm">👁️</span>
                    </button>
                </div>
            </div>

            <!-- Info Box -->
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-3">
                <div class="flex">
                    <svg class="w-5 h-5 text-blue-600 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <p class="text-xs text-blue-800">
                        Your new password must be at least 6 characters long and different from your current password.
                    </p>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition duration-200">
                Change Password
            </button>
        </div>
    </form>
</div>

<script>
function togglePassword(fieldId, iconId) {
    const passwordField = document.getElementById(fieldId);
    const toggleIcon = document.getElementById(iconId);
    
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.textContent = '🙈';
    } else {
        passwordField.type = 'password';
        toggleIcon.textContent = '👁️';
    }
}
</script>
{% endblock %}
