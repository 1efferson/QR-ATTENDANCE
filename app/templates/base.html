<!-- base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/toast.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student-mobile.css') }}">

    <!-- PWA + Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QR Attendance">
    <meta name="mobile-web-app-capable" content="yes"> 
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Toast Container -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <nav class="bg-white border-b border-gray-200 relative z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">

                <div class="flex items-center">
                    <span class="text-xl font-bold text-indigo-600">QR-Attend</span>
                </div>

                <div class="flex items-center space-x-4 relative z-10000">
                {% if current_user.is_authenticated %}
                    <span class="text-sm text-gray-500 hidden sm:block">
                        Hi, {{ current_user.name | title }}
                    </span>

                    {% if current_user.role == 'admin' %}
                        <a href="{{ url_for('admin.dashboard') }}"
                        class="text-sm font-medium text-indigo-600 hover:text-indigo-800 border border-indigo-200 px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition">
                            Admin
                        </a>
                    {% endif %}
                    <div class="relative text-left inline-block {% if current_user.role == 'student' and request.blueprint == 'student' %}student-nav-settings{% endif %}">
                        <button id="settingsMenuButton" class="p-2 text-gray-500 hover:text-indigo-600 hover:bg-gray-100 rounded-full transition-colors focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                       
                        <div id="settingsDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-xl py-2 z-50">
                            <div class="px-4 py-2 border-b border-gray-100 sm:hidden">
                                <p class="text-xs text-gray-400 uppercase font-semibold">User</p>
                                <p class="text-sm font-medium text-gray-700 truncate">{{ current_user.name }}</p>
                            </div>
                            
                            <a href="{{ url_for('auth.change_password') }}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition">
                                Change Password
                            </a>
                            
                            <hr class="my-1 border-gray-100">
                            
                            <a href="{{ url_for('auth.logout') }}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition">
                                Logout
                            </a>
                        </div>
                    </div>

                    {% else %}
                        <a href="{{ url_for('auth.login') }}" class="text-sm font-medium text-gray-700 hover:text-indigo-600">
                            Login
                        </a>
                    {% endif %}
                </div>

            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Flash messages — serialised as a single JSON blob, no Jinja inside JS -->
<script>
    window._flashMessages = {{ get_flashed_messages(with_categories=true) | tojson }};
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // ── Toast System ──────────────────────────────────────────────────────
    const DURATION = 5000;

    const ICONS = {
        success: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
        error:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
        warning: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        info:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    };

    const TITLES = { success: 'Success', error: 'Error', warning: 'Warning', info: 'Info' };

    function resolveType(category) {
        if (category === 'danger') return 'error';
        if (['success', 'error', 'warning', 'info'].includes(category)) return category;
        return 'info';
    }

    function dismiss(toast) {
        toast.classList.remove('show');
        toast.classList.add('hide');
        toast.addEventListener('transitionend', () => toast.remove(), { once: true });
    }

    function showToast({ category, message }) {
        const type      = resolveType(category);
        const container = document.getElementById('toast-container');
        const toast     = document.createElement('div');

        toast.className = `toast toast-${type}`;
        toast.setAttribute('role', 'alert');
        toast.innerHTML = `
            <div class="toast-icon">${ICONS[type]}</div>
            <div class="toast-body">
                <div class="toast-title">${TITLES[type]}</div>
                <div class="toast-message">${message}</div>
            </div>
            <button class="toast-close" aria-label="Dismiss">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="toast-progress" style="animation-duration: ${DURATION}ms;"></div>
        `;

        container.appendChild(toast);
        requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));

        const timer = setTimeout(() => dismiss(toast), DURATION);
        toast.querySelector('.toast-close').addEventListener('click', () => {
            clearTimeout(timer);
            dismiss(toast);
        });
    }

    // Expose globally for use in other scripts
    window.showToast = showToast;

    // Fire any flash messages from Flask
    (window._flashMessages || []).forEach(([category, message], i) => {
        setTimeout(() => showToast({ category, message }), i * 150);
    });


    // ── Modal Manager ─────────────────────────────────────────────────────
    window.openModal = function(id) {
        const modal = document.getElementById(id);
        if (!modal) return;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        const card = document.getElementById(id + 'Card');
        if (card) {
            requestAnimationFrame(() => requestAnimationFrame(() => {
                card.classList.remove('scale-95', 'opacity-0');
                card.classList.add('scale-100', 'opacity-100');
            }));
        }
    };

    window.closeModal = function(id) {
        const modal = document.getElementById(id);
        if (!modal) return;
        const card = document.getElementById(id + 'Card');
        if (card) {
            card.classList.remove('scale-100', 'opacity-100');
            card.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        } else {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    };

    // Close modal when clicking the backdrop
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal-backdrop')) {
            window.closeModal(e.target.id);
        }
    });


    // ── Settings Gear Dropdown ────────────────────────────────────────────
    const btn      = document.getElementById('settingsMenuButton');
    const dropdown = document.getElementById('settingsDropdown');

    if (btn && dropdown) {
        // Toggle on gear click — stopPropagation prevents the document
        // click listener below from immediately closing it again
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
        });

        // Close when clicking anywhere outside the button or dropdown
        document.addEventListener('click', (e) => {
            if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
    }

    // ── Single Escape handler (modals + dropdown) ─────────────────────────
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (dropdown) dropdown.classList.add('hidden');
        document.querySelectorAll('.modal-backdrop:not(.hidden)').forEach(m => {
            window.closeModal(m.id);
        });
    });


    // ── PWA / Service Worker ──────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .catch(err => console.error('SW registration failed:', err));
    }

    const isIOS            = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isInStandaloneMode = window.navigator.standalone;
    if (isIOS && !isInStandaloneMode) {
        console.info('iOS detected: user can install via Share → Add to Home Screen');
    }
    // Re-attach listeners when browser restores page from back/forward cache
    window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
        // Page was restored from bfcache — reload to get fresh CSRF token
        window.location.reload();
    }
});

});
</script>

</body>
</html>
